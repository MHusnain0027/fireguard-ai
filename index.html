<!DOCTYPE html>
<html>
<head>
    <title>FireGuard AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🔥 FireGuard AI</h1>
<p>AI Powered Fire Safety Assistant</p>

<div class="dashboard">

<div class="card">
<h2>System Status</h2>
<p class="online">🟢 ONLINE</p>
</div>

<div class="card">
<h2>Fire Alarm Status</h2>
<p>✅ Normal</p>
</div>

<div class="card">
<h2>Active Location</h2>
<p>No Active Alarm</p>
</div>

<div class="card">
<h2>AI Assistant</h2>
<p>Ready for Safety Analysis</p>
</div>

</div>

<button onclick="startSystem()">
Start FireGuard AI
</button>

</div>

<script src="script.js"></script>

</body>
</html>
